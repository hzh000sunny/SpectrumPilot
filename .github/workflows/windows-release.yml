name: Windows Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows-installer:
    name: Build Windows installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            apps/desktop/src-tauri -> apps/desktop/src-tauri/target

      - name: Install frontend dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Run seed release checks
        run: python -m unittest scripts/3gpp/test_release_readiness.py

      - name: Run frontend tests
        working-directory: apps/desktop
        run: npm test -- --run

      - name: Run Rust tests
        run: cargo test -p spectrum-pilot-desktop --manifest-path apps/desktop/src-tauri/Cargo.toml

      - name: Build Windows installer and updater artifacts
        if: startsWith(github.ref, 'refs/tags/')
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop
          tagName: ${{ github.ref_name }}
          releaseName: "SpectrumPilot ${{ github.ref_name }}"
          releaseBody: "SpectrumPilot Windows installer and updater artifacts."
          releaseDraft: true
          prerelease: false
